services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WORKER_URL=http://worker:3002
    depends_on:
      - worker
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WORKER_PORT=3002
    restart: unless-stopped
